name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create Xcode Project Structure
      run: |
        mkdir -p ProximityApp
        cd ProximityApp

        # Swift source files
        cat << 'EOF' > ViewController.swift
        import UIKit

        class ViewController: UIViewController {
            override func viewDidLoad() {
                super.viewDidLoad()
                UIDevice.current.isProximityMonitoringEnabled = false
            }
        }
        EOF

        cat << 'EOF' > AppDelegate.swift
        import UIKit

        @main
        class AppDelegate: UIResponder, UIApplicationDelegate {
            var window: UIWindow?
            func application(_ application: UIApplication,
                didFinishLaunchingWithOptions launchOptions:
                [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                return true
            }
        }
        EOF

        # Info.plist
        cat << 'EOF' > Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
        "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.example.ProximityApp</string>
            <key>CFBundleName</key>
            <string>ProximityApp</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIMainStoryboardFile</key>
            <string>Main</string>
        </dict>
        </plist>
        EOF

        # Storyboards
        mkdir -p Base.lproj

        cat << 'EOF' > Base.lproj/Main.storyboard
        <?xml version="1.0" encoding="UTF-8"?>
        <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB"
        version="3.0" toolsVersion="22000" targetRuntime="iOS.CocoaTouch"
        initialViewController="VC">
        <scenes>
            <scene sceneID="main">
                <objects>
                    <viewController id="VC" customClass="ViewController">
                        <view key="view" id="view">
                            <rect key="frame" x="0" y="0" width="393" height="852"/>
                            <color key="backgroundColor" white="1" alpha="1"/>
                        </view>
                    </viewController>
                </objects>
            </scene>
        </scenes>
        </document>
        EOF

        cat << 'EOF' > Base.lproj/LaunchScreen.storyboard
        <?xml version="1.0" encoding="UTF-8"?>
        <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB"
        version="3.0" toolsVersion="22000" targetRuntime="iOS.CocoaTouch"
        launchScreen="YES">
        <scenes>
            <scene sceneID="launch">
                <objects>
                    <viewController id="LS">
                        <view key="view" id="view">
                            <rect key="frame" x="0" y="0" width="393" height="852"/>
                            <color key="backgroundColor" white="1" alpha="1"/>
                        </view>
                    </viewController>
                </objects>
            </scene>
        </scenes>
        </document>
        EOF

        # Create minimal Xcode project folder
        mkdir -p ProximityApp.xcodeproj
        cat << 'EOF' > ProximityApp.xcodeproj/project.pbxproj
        // Minimal pbxproj generated for GitHub Actions build
        {
          archiveVersion = 1;
          classes = {};
          objectVersion = 56;
          objects = {};
          rootObject = 1;
        }
        EOF

    - name: Build App
      run: |
        xcodebuild -project ProximityApp/ProximityApp.xcodeproj \
          -sdk iphoneos -configuration Release build

    - name: Package IPA
      run: |
        mkdir Payload
        cp -R ProximityApp/build/Release-iphoneos/ProximityApp.app Payload/
        zip -r ProximityApp.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ProximityApp
        path: ProximityApp.ipa
